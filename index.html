<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WoR Roulette</title>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

h1 {
  margin: 20px 0 5px;
}

.pointer {
  width: 0;
  height: 0;
  border-left: 20px solid transparent;
  border-right: 20px solid transparent;
  border-bottom: 35px solid gold;
  margin: 0 auto -10px;
}

canvas {
  display: block;
  margin: auto;
}

button {
  margin: 15px;
  padding: 12px 24px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  background: gold;
  font-weight: bold;
  cursor: pointer;
}

#result {
  font-size: 30px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>WoR Roulette</h1>
<div class="pointer"></div>
<canvas id="wheel" width="700" height="700"></canvas>

<button onclick="spin()">SPIN</button>

<div id="result">Prime the engine.</div>

<script>
const slices = [
"SSH","Imperial Walkers","Hillbillies","Toy Soldiers","Windmills","Calf Raises",
"Forward Lunges","Reverse Lunges","Squat + Reach","Lateral Lunges","Slow Air Squats",
"Leg Swings F/B","Leg Swings S/S","Hip Circles","Ankle Rolls","World's Greatest Stretch","Groiners",
"High Knees","Butt Kickers","Light Jump Squats","Broad Jump + Reset","Skaters","Fast Feet Chop",
"Dealer's Choice","Hold Low Squat","Pulse Lunges","Tempo Squats","Mt Grizz Preview"
];

const colors = [
"#2e7d32","#2e7d32","#2e7d32","#2e7d32","#2e7d32","#2e7d32",
"#c69300","#c69300","#c69300","#c69300","#c69300",
"#d66b00","#d66b00","#d66b00","#d66b00","#d66b00","#d66b00",
"#b3261e","#b3261e","#b3261e","#b3261e","#b3261e","#b3261e",
"#000","#000","#000","#000","#000"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let rotation = 0;
let spinning = false;
let highlightIndex = null;

const cx = 350;
const cy = 350;
const radius = 300;
const arc = 2 * Math.PI / slices.length;

// DRAW
function draw(){
  ctx.clearRect(0,0,700,700);

  for(let i=0;i<slices.length;i++){
    const start = rotation + i * arc - Math.PI/2;
    const end = start + arc;

    // slice
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,radius,start,end);
    ctx.closePath();
    ctx.fillStyle = colors[i];
    ctx.fill();

    // highlight
    if(i === highlightIndex){
      ctx.strokeStyle = "gold";
      ctx.lineWidth = 5;
      ctx.stroke();
    }

    // TEXT (lengthwise)
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(start + arc/2);

    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.font = "bold 15px Arial";

    // flip text if upside down
    let angle = (start + arc/2) % (2*Math.PI);
    if(angle > Math.PI/2 && angle < 3*Math.PI/2){
      ctx.rotate(Math.PI);
    }

    ctx.fillText(slices[i], radius * 0.65, 0);

    ctx.restore();
  }

  // center
  ctx.beginPath();
  ctx.arc(cx,cy,70,0,Math.PI*2);
  ctx.fillStyle="#222";
  ctx.fill();

  ctx.fillStyle="gold";
  ctx.font="bold 24px Arial";
  ctx.textAlign="center";
  ctx.fillText("WoR",cx,cy);
}

// 🔊 CLICK
let audioCtx;
function clickSound(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = 900;
  gain.gain.value = 0.05;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.03);
}

// 🗣️ SPEAK
function speak(text){
  const msg = new SpeechSynthesisUtterance(text);
  msg.rate = 0.95;
  speechSynthesis.speak(msg);
}

// 🎯 CORRECT WINNER (pointer based)
function getWinnerIndex(){
  const pointerAngle = -Math.PI/2;
  let adjusted = (pointerAngle - rotation) % (2*Math.PI);
  if(adjusted < 0) adjusted += 2*Math.PI;

  return Math.floor(adjusted / arc);
}

// 🎰 SPIN
function spin(){
  if(spinning) return;

  spinning = true;
  highlightIndex = null;

  let spinTime = Math.random()*2000 + 3000;
  let start = null;
  let lastIndex = null;

  function animate(t){
    if(!start) start = t;
    let progress = t - start;

    rotation += 0.15;

    let currentIndex = getWinnerIndex();
    if(currentIndex !== lastIndex){
      clickSound();
      lastIndex = currentIndex;
    }

    draw();

    if(progress < spinTime){
      requestAnimationFrame(animate);
    } else {
      spinning = false;

      let winner = getWinnerIndex();
      highlightIndex = winner;
      draw();

      document.getElementById("result").innerText = slices[winner];
      speak(slices[winner]);
    }
  }

  requestAnimationFrame(animate);
}

draw();
</script>

</body>
</html>
